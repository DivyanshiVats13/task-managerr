<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Flow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="greeting">Welcome Back! 👋</h1>
            <p>Let's make today wonderfully productive.</p>
        </header>

        <form id="task-form" class="task-form">
            <input type="text" id="task-input" placeholder="E.g., Review the new design mockups..." autocomplete="off" required>
            <button type="submit" id="add-btn" class="btn btn-primary">
                <i class="ph-fill ph-plus-circle"></i> Add Task
            </button>
        </form>

        <div class="filter-container">
            <span class="task-count" id="task-count">✨ Fresh start everywhere</span>
            <button id="clear-all" class="btn btn-text">
                <i class="ph ph-broom"></i> Clear Board
            </button>
        </div>

        <ul id="task-list" class="task-list">
            
        </ul>
        
        <div id="empty-state" class="empty-state">
            <i class="ph-fill ph-coffee"></i>
            <p><strong>All caught up!</strong><br>Take a deep breath or plan your next move.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
